    - Aggregation: bql/aggregation.md
    - Display & Sorting: bql/display-and-sorting.md
    - Field Operations: bql/field-operations.md
    - Chain Detection: bql/chain.md
    - Join: bql/join.md
    - Graph Traversal: bql/graph-traversal.md
    - Enrichment: bql/enrichment.md
    - Time Functions: bql/time-functions.md
