apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: bifract
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - containerPort: 443
              name: https
            - containerPort: 8443
              name: ingest
            - containerPort: 80
              name: http
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-logs
              mountPath: /var/log/caddy
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
        - name: log-shipper
          image: alpine:3
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache jq curl > /dev/null 2>&1
              exec /scripts/ship-logs.sh
          env:
            - name: BIFRACT_INGEST_URL
              value: "http://bifract.bifract.svc.cluster.local:8080/api/v1/internal/ingest/system"
          volumeMounts:
            - name: caddy-logs
              mountPath: /var/log/caddy
              readOnly: true
            - name: log-shipper-script
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: caddyfile
          configMap:
            name: caddy-config
        - name: caddy-data
          emptyDir: {}
        - name: caddy-logs
          emptyDir: {}
        - name: log-shipper-script
          configMap:
            name: caddy-log-shipper
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: bifract
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - port: 443
      targetPort: 443
      name: https
    - port: 8443
      targetPort: 8443
      name: ingest
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: caddy
