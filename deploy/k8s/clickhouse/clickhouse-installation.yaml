# ClickHouse cluster managed by the official ClickHouse Kubernetes Operator.
# Prerequisites:
#   1. Install cert-manager:
#      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml
#   2. Install the ClickHouse operator:
#      helm install clickhouse-operator -n clickhouse-operator-system --create-namespace \
#        oci://ghcr.io/clickhouse/clickhouse-operator-helm
#
# Customize replicas and storage to fit your workload.
apiVersion: clickhouse.com/v1alpha1
kind: KeeperCluster
metadata:
  name: bifract-keeper
  namespace: bifract
spec:
  replicas: 1
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  containerTemplate:
    image:
      repository: clickhouse/clickhouse-keeper
      tag: "26.2-alpine"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: bifract-ch
  namespace: bifract
spec:
  replicas: 2
  keeperClusterRef:
    name: bifract-keeper
  podTemplate:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: bifract-ch-clickhouse
              topologyKey: kubernetes.io/hostname
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 100Gi
  containerTemplate:
    image:
      repository: clickhouse/clickhouse-server
      tag: "26.2-alpine"
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 16Gi
  settings:
    defaultUserPassword:
      passwordType: password_sha256_hex
      secret:
        name: bifract-secrets
        key: CLICKHOUSE_PASSWORD_HASH
  # ---------------------------------------------------------------------------
  # Cold storage tier (optional). Disabled by default.
  #
  # To enable, inject a server config file defining an s3/azure_blob_storage disk
  # (wrapped in a cache disk) and a 'tiered' storage policy whose hot volume is
  # NAMED 'default' (with the 'default' disk), then set
  # BIFRACT_COLD_STORAGE_BACKEND=s3 (or azure) on the bifract app (secret key
  # COLD_STORAGE_BACKEND). The app applies the policy to the logs table at startup.
  # The hot volume must be named 'default' or ALTER ... MODIFY SETTING
  # storage_policy is rejected (new policy must contain the current policy's volume).
  #
  # Use the same storage_configuration XML as
  # clickhouse/config.d/storage.s3.xml.example / storage.azure.xml.example, with
  # credentials sourced from the bifract-secrets Secret (S3_ACCESS_KEY,
  # S3_SECRET_KEY, S3_REGION, COLD_STORAGE_ENDPOINT, or the AZURE_* keys).
  # Mount it into the ClickHouse pods via this operator's config-file mechanism
  # (consult your installed operator version's CRD for the exact field, e.g. a
  # files/config section).
