# IMPORTANT: Replace placeholder values before applying.
# Generate secure values with: openssl rand -base64 24
# For hex keys: openssl rand -hex 32
#
# In production, use a secrets manager (Sealed Secrets, External Secrets, etc.)
# instead of storing secrets in plaintext YAML.
apiVersion: v1
kind: Secret
metadata:
  name: bifract-secrets
  namespace: bifract
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  PASSWORD_PEPPER: "CHANGE_ME"
  FEED_ENCRYPTION_KEY: "CHANGE_ME"
  BACKUP_ENCRYPTION_KEY: "CHANGE_ME"
