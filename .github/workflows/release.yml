name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-bifract:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build bifract
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BINARY_NAME="bifract-${GOOS}-${GOARCH}"
          go build \
            -ldflags="-w -s -X bifract/internal/setup.Version=${VERSION} -X bifract/internal/setup.Commit=${COMMIT} -X bifract/internal/setup.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "${BINARY_NAME}" \
            ./cmd/bifract

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bifract-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bifract-*

  release:
    needs: [build-bifract]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "${TAG}" bifract-* --repo "${{ github.repository }}" --clobber
