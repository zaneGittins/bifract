# Keep in sync with internal/setup/templates/docker-compose.yml.tmpl
services:
  caddy:
    image: caddy:2-alpine
    container_name: bifract-caddy
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/ship-logs.sh:/usr/local/bin/ship-logs.sh
      - ./caddy/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - caddy-data:/data
      - caddy-config:/config
    environment:
      BIFRACT_DOMAIN: ${BIFRACT_DOMAIN:-localhost}
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    depends_on:
      - bifract
    networks:
      - bifract-network
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: bifract-postgres
    environment:
      POSTGRES_DB: bifract
      POSTGRES_USER: bifract
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bifract}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bifract"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifract-network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.2-alpine
    container_name: bifract-clickhouse
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Cold storage tier config (inert by default; see clickhouse/config.d/storage.xml).
      # Mounted as a single file so the image's own config.d files are preserved.
      - ./clickhouse/config.d/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro
    environment:
      CLICKHOUSE_DB: logs
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-bifract}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # Cold storage credentials (consumed by storage.xml via from_env when enabled)
      BIFRACT_COLD_STORAGE_ENDPOINT: ${BIFRACT_COLD_STORAGE_ENDPOINT:-}
      BIFRACT_COLD_STORAGE_CACHE_SIZE: ${BIFRACT_COLD_STORAGE_CACHE_SIZE:-53687091200}
      BIFRACT_S3_ACCESS_KEY: ${BIFRACT_S3_ACCESS_KEY:-}
      BIFRACT_S3_SECRET_KEY: ${BIFRACT_S3_SECRET_KEY:-}
      BIFRACT_S3_REGION: ${BIFRACT_S3_REGION:-}
      BIFRACT_AZURE_STORAGE_URL: ${BIFRACT_AZURE_STORAGE_URL:-}
      BIFRACT_AZURE_CONTAINER: ${BIFRACT_AZURE_CONTAINER:-}
      BIFRACT_AZURE_STORAGE_ACCOUNT: ${BIFRACT_AZURE_STORAGE_ACCOUNT:-}
      BIFRACT_AZURE_STORAGE_KEY: ${BIFRACT_AZURE_STORAGE_KEY:-}
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "${CLICKHOUSE_PASSWORD:-bifract}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifract-network
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.81.14-stable
    container_name: bifract-litellm
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-bifract-internal-key}
    command: ["--config", "/app/config.yaml", "--port", "8000"]
    networks:
      - bifract-network
    restart: unless-stopped

  bifract:
    image: bifract-dev
    container_name: bifract-app
    restart: unless-stopped
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: logs
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-bifract}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bifract
      POSTGRES_USER: bifract
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bifract}
      BIFRACT_PORT: 8080
      BIFRACT_MAX_QUERY_ROWS: 250
      BIFRACT_SECURE_COOKIES: ${BIFRACT_SECURE_COOKIES:-false}
      BIFRACT_CORS_ORIGINS: ${BIFRACT_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      BIFRACT_PASSWORD_PEPPER: ${BIFRACT_PASSWORD_PEPPER:-}
      LITELLM_URL: http://litellm:8000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-bifract-internal-key}
      BIFRACT_BACKUP_ENCRYPTION_KEY: ${BIFRACT_BACKUP_ENCRYPTION_KEY:-}
      BIFRACT_S3_ENDPOINT: ${BIFRACT_S3_ENDPOINT:-}
      BIFRACT_S3_BUCKET: ${BIFRACT_S3_BUCKET:-}
      BIFRACT_S3_ACCESS_KEY: ${BIFRACT_S3_ACCESS_KEY:-}
      BIFRACT_S3_SECRET_KEY: ${BIFRACT_S3_SECRET_KEY:-}
      BIFRACT_S3_REGION: ${BIFRACT_S3_REGION:-}
      BIFRACT_COLD_STORAGE_BACKEND: ${BIFRACT_COLD_STORAGE_BACKEND:-none}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_EDITION_IDS: ${MAXMIND_EDITION_IDS:-GeoLite2-City-CSV,GeoLite2-ASN-CSV}
    volumes:
      - bifract-maxmind:/data/maxmind
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - bifract-network

volumes:
  postgres-data:
  clickhouse-data:
  caddy-data:
  caddy-config:
  bifract-maxmind:

networks:
  bifract-network:
    driver: bridge
